kind: Deployment
apiVersion: apps/v1
metadata:
  name: sca-service
  labels:
    app: sca-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sca-hazelcast-openshift-mvp
  template:
    metadata:
      labels:
        app: sca-hazelcast-openshift-mvp
    spec:
      containers:
        - name:  sca-hazelcast-openshift-mvp
          image: java-springboot-image:latest
          imagePullPolicy: Always          
          ports:
            - containerPort: 8081
              name: http
            - containerPort: 5701
              name: hazelcast
          env:
            - name: OPENSHIFT_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: HZ_KUBERNETES_ENABLED
              value: "true"
            - name: HZ_KUBERNETES_SERVICE_NAME
              value: "sca-hazelcast-openshift-mvp"
            - name: HZ_CLUSTER_NAME
              value: "sca-cluster"
            - name: HZ_MAP_NAME
              value: "scaContext"
            - name: JAVA_TOOL_OPTIONS
              value: >-
                -XX:MaxRAMPercentage=75
                -Djava.net.preferIPv4Stack=true
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3              
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: 1000m
kind: Service
apiVersion: v1
metadata:
  name: sca-hazelcast-openshift-mvp
  labels:
    app: sca-hazelcast-openshift-mvp  
spec:
  clusterIP: None
  ports:
    - name: http-8081
      port: 8081
      targetPort: 8081
    - name: hazelcast
      port: 5701
      targetPort: 5701      
  selector:
    app: sca-hazelcast-openshift-mvp