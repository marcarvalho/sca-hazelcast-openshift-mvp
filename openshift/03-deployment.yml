apiVersion: apps/v1
kind: Deployment
metadata:
  name: sca-hazelcast-openshift-mvp
  labels:
    app: sca-hazelcast-openshift-mvp
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sca-hazelcast-openshift-mvp
  template:
    metadata:
      labels:
        app: sca-hazelcast-openshift-mvp
    spec:
      containers:
        - name: sca-hazelcast-openshift-mvp
          image: image-registry.openshift-image-registry.svc:5000/SEU_NAMESPACE/sca-hazelcast-openshift-mvp:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
              name: http
            - containerPort: 5701
              name: hazelcast
          env:
            - name: SERVER_PORT
              value: "8081"
            - name: OPENSHIFT_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: HZ_KUBERNETES_ENABLED
              value: "true"
            - name: HZ_KUBERNETES_SERVICE_NAME
              value: sca-hazelcast-headless
            - name: HZ_CLUSTER_NAME
              value: sca-cluster
            - name: HZ_MAP_NAME
              value: scaContext
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=75 -Djava.net.preferIPv4Stack=true"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: 1000m